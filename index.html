                                  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

body {
    background-color: #111;
    color: white;
    overflow-x: hidden;
}

/* Navbar */
.navbar {
    padding: 20px 50px;
    display: flex;
    align-items: center;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
}

.logo {
    color: #e50914; /* แดง Netflix */
    font-size: 30px;
    margin-right: 25px;
}

.navbar ul {
    display: flex;
    list-style: none;
}

.navbar ul li a {
    color: #e5e5e5;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
    transition: 0.3s;
}

.navbar ul li a:hover { color: #b3b3b3; }

/* Hero Section */
.hero {
    height: 80vh;
    background: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0)), 
                url('https://images.unsplash.com/photo-1540575861501-7cf05a4b125a?q=80&w=1200');
    background-size: cover;
    display: flex;
    align-items: center;
    padding-left: 50px;
}

.hero-content { max-width: 600px; }
.hero-title { font-size: 3.5rem; margin-bottom: 20px; }
.hero-description { font-size: 1.2rem; margin-bottom: 20px; }

.hero-buttons button {
    padding: 10px 25px;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    margin-right: 10px;
}

.play-btn { background-color: white; color: black; }
.play-btn:hover { background-color: rgba(255,255,255,0.7); }
.info-btn { background-color: rgba(109, 109, 110, 0.7); color: white; }

/* Content Rows */
.main-container { padding: 20px 50px; margin-top: -100px; }
.row-header { font-size: 20px; margin-bottom: 10px; }

.row {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 20px 0;
}

.row::-webkit-scrollbar { display: none; } /* ซ่อน Scrollbar */

.card {
    min-width: 240px;
    height: 135px;
    background-color: #333;
    position: relative;
    transition: transform 0.3s;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
}

.card span {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

.card:hover {
    transform: scale(1.1);
    z-index: 10;
}
